# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy

name: Build and deploy Python app to Azure Web App - eloasmedical

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ✅ Build inside /speed-to-response
      - name: Create virtual environment and install dependencies
        run: |
          cd speed-to-response
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      # ✅ Upload ONLY the app folder (not entire repo)
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            speed-to-response
            !speed-to-response/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9577C625F5D843D9BBF57970600F9AE6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E81DFC31C72042E58EBA1098B00F3244 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8B6B566AD6F04DF5BDD3EE378FB1E110 }}

      # ✅ Deploy the subfolder
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'eloasmedical'
          slot-name: 'Production'
          package: speed-to-response

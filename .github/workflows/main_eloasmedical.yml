# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

# Backend (Flask) lives in speed-to-response/ — not the repo root.
name: Build and deploy Python app to Azure Web App - eloasmedical

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Build venv in CI (--copies = real interpreter files, not symlinks to the GitHub runner).
      # With SCM_DO_BUILD_DURING_DEPLOYMENT=false (set in deploy job), App Service skips Oryx and uses this antenv.
      - name: Create virtual environment and install dependencies
        working-directory: speed-to-response
        run: |
          python -m venv --copies antenv
          source antenv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare deployment bundle
        run: |
          rm -f speed-to-response/.env

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: speed-to-response

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9577C625F5D843D9BBF57970600F9AE6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E81DFC31C72042E58EBA1098B00F3244 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8B6B566AD6F04DF5BDD3EE378FB1E110 }}

      # App settings changes restart the SCM (Kudu) container. Deploying immediately after aborts OneDeploy
      # with "Deployment has been stopped due to SCM container restart". Wait until SCM stabilizes, then zip deploy.
      - name: Skip Oryx remote build (use CI antenv)
        run: |
          RG=$(az webapp list --query "[?name=='eloasmedical'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ] || [ "$RG" = "None" ]; then
            echo "::error::Could not resolve resource group for web app eloasmedical in the current subscription."
            exit 1
          fi
          echo "RG=$RG" >> "$GITHUB_ENV"
          az webapp config appsettings set -g "$RG" -n eloasmedical --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false
          az webapp config appsettings delete -g "$RG" -n eloasmedical --setting-names WEBSITE_RUN_FROM_PACKAGE 2>/dev/null || true
          echo "Waiting for SCM to restart after app settings update (required before zip deploy)..."
          sleep 120

      - name: Verify deploy bundle layout
        run: |
          test -f deploy/app.py || { echo "::error::deploy/app.py missing — artifact layout wrong"; ls -la deploy; exit 1; }
          test -d deploy/antenv || { echo "::error::deploy/antenv missing — pre-built venv not in artifact"; exit 1; }

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'eloasmedical'
          slot-name: 'Production'
          package: deploy

      # Override Portal "python app.py" so the worker uses gunicorn + antenv (matches Microsoft Flask guidance).
      - name: Set startup command to gunicorn
        if: success()
        run: |
          az webapp config set -g "$RG" -n eloasmedical --generic-configurations '{"appCommandLine":"gunicorn --bind=0.0.0.0:8000 --chdir /home/site/wwwroot app:app"}'
          